        <!-- search Section -->
        <main class="hero">
            <h1>Find Your Perfect Roadmap</h1>
            <p>Search by skill, career, or goal to start your personalized journey</p>
       <input type="text" id="searchInput" placeholder="What would you like to learn?" />
  <button id="searchBtn">Search</button>

            </main>
<script type="module">
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAAGZ_ajxETsFFyox-mtbAhwu6FsGeC22E",
      authDomain: "skill-navigator-7096.firebaseapp.com",
      projectId: "skill-navigator-7096",
      storageBucket: "skill-navigator-7096.firebasestorage.app",
      messagingSenderId: "732968618404",
      appId: "1:732968618404:web:325d8fb5bbc7659962d931"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authButtons = document.getElementById("auth-buttons");
    const userInfo = document.getElementById("user-info");
    const username = document.getElementById("username");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authButtons.style.display = "none";
        userInfo.style.display = "flex";

        const docRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(docRef);
        if (userSnap.exists()) {
          username.innerText = userSnap.data().fullName || "User";
        }
      } else {
        authButtons.style.display = "flex";
        userInfo.style.display = "none";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "loginin.html";
    });

</script>
<script src="script.js"></script>
</body>
</html>
