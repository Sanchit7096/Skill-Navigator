<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Skill Navigator</title>
   <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="main-content">
        <a href="index.html" class="back-link">
            ← Back to Home
        </a>

        <div class="form-container">
            <!-- <div class="logo">SN</div> -->
            
            <h1 class="form-title">Welcome Back</h1>
            <p class="form-subtitle">Sign in to continue your learning journey</p>

            <form>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password">
                        <button type="button" class="password-toggle">👁</button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-container">
                        <input type="checkbox" id="remember" class="checkbox">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <p class="signup-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>
<!-- login.html (partial relevant part) -->
<script type="module">
  import { login } from './auth.js';

  const form = document.querySelector('form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await login(email, password);
      alert('Logged in successfully!');
      window.location.href = 'index.html';
    } catch (error) {
      alert('Error: ' + error.message);
    }
  });
</script>

 

</body>
</html>
